<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Comités · Grupo Oberon</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500&display=swap');
:root {
  --bg:#fafaf8;--surface:#ffffff;--surface2:#f5f4f0;--border:#e8e6e0;--border2:#d4d0c8;
  --text:#1a1a18;--muted:#6b6860;--muted2:#9a9890;
  --accent:#8b6914;--danger:#c0392b;--warn:#c0692b;--ok:#2d7a4f;--info:#2b5fc0;--purple:#5b3fc0;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.04);
  --shadow-lg:0 2px 8px rgba(0,0,0,.09),0 8px 32px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-weight:400;min-height:100vh;overflow:hidden}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:13px 36px;background:var(--surface);border-bottom:1px solid var(--border);box-shadow:var(--shadow);position:relative;z-index:10}
.topbar-title{font-family:'Instrument Serif',serif;font-size:19px;color:var(--accent);letter-spacing:.01em}
.topbar-meta{display:flex;gap:24px;align-items:center}
.meta-item{display:flex;flex-direction:column;align-items:flex-end;gap:1px}
.meta-num{font-family:'Instrument Serif',serif;font-size:17px;color:var(--text);line-height:1}
.meta-label{font-size:9px;color:var(--muted2);text-transform:uppercase;letter-spacing:.07em}
.layout{display:flex;height:calc(100vh - 55px)}
.canvas-wrap{flex:1;position:relative;overflow:hidden;background:var(--bg)}
.nodes-layer{position:relative;width:100%;height:100%}

/* NODE BASE */
.node{position:absolute;transform:translate(-50%,-50%);cursor:pointer;transition:transform .18s ease;user-select:none}
.node:hover{transform:translate(-50%,-50%) scale(1.07)}
.node.active{transform:translate(-50%,-50%) scale(1.07)}
.node-circle{border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;background:var(--surface);border:1.5px solid var(--border2);box-shadow:var(--shadow);position:relative;transition:box-shadow .18s,border-color .18s}
.node:hover .node-circle,.node.active .node-circle{box-shadow:var(--shadow-lg)}
.node-label{font-family:'Instrument Serif',serif;text-align:center;line-height:1.15;color:var(--text)}
.node-sub{font-size:9px;color:var(--muted2);text-align:center;font-family:'Inter',sans-serif;font-weight:300;letter-spacing:.02em}
.node-badge{position:absolute;top:-5px;right:-5px;color:white;border-radius:50%;width:19px;height:19px;font-size:9px;font-weight:500;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg)}
.node-center .node-circle{width:106px;height:106px;border-color:var(--accent);border-width:2px}
.node-center .node-label{font-size:14px;color:var(--accent)}
.node-company .node-circle{width:78px;height:78px}
.node-company .node-label{font-size:11px}



.hint{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--muted2);letter-spacing:.06em;pointer-events:none;text-transform:uppercase}

/* GLOBAL SEARCH */
.global-search{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  width:min(560px,80%);
  z-index:20;
}
.gs-row{
  display:flex;
  gap:8px;
  align-items:center;
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:28px;
  padding:8px 8px 8px 18px;
  box-shadow:var(--shadow-lg);
  transition:box-shadow .2s,border-color .2s;
}
.gs-row:focus-within{
  border-color:var(--accent);
  box-shadow:0 2px 12px rgba(139,105,20,.12),0 8px 32px rgba(0,0,0,.06);
}
.gs-input{
  flex:1;
  border:none;
  outline:none;
  font-size:13px;
  font-family:'Inter',sans-serif;
  background:transparent;
  color:var(--text);
  min-width:0;
}
.gs-input::placeholder{color:var(--muted2)}
.gs-btn{
  background:var(--accent);
  border:none;
  border-radius:20px;
  color:white;
  cursor:pointer;
  padding:6px 16px;
  font-size:12px;
  font-family:'Inter',sans-serif;
  font-weight:500;
  white-space:nowrap;
  transition:opacity .15s;
  flex-shrink:0;
}
.gs-btn:hover{opacity:.85}
.gs-btn:disabled{opacity:.4;cursor:not-allowed}
.gs-answer{
  margin-top:8px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px 18px;
  font-size:12px;
  color:var(--text);
  line-height:1.7;
  box-shadow:var(--shadow-lg);
  display:none;
  max-height:220px;
  overflow-y:auto;
  position:relative;
}
.gs-answer.on{display:block}
.gs-answer::-webkit-scrollbar{width:3px}
.gs-answer::-webkit-scrollbar-thumb{background:var(--border2)}
.gs-close{
  position:absolute;
  top:10px;right:12px;
  background:transparent;border:none;
  color:var(--muted2);cursor:pointer;
  font-size:14px;line-height:1;
}
.gs-close:hover{color:var(--text)}
.gs-thinking{display:flex;gap:4px;align-items:center;padding:2px 0}

/* PANEL */
.panel{width:400px;min-width:400px;border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden;transition:width .25s ease,min-width .25s ease;box-shadow:-2px 0 12px rgba(0,0,0,.04)}
.panel.closed{width:0;min-width:0;border-left:none;box-shadow:none}
.panel-header{padding:18px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0;position:relative;background:var(--surface2)}
.panel-eyebrow{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.09em;margin-bottom:3px}
.panel-title{font-family:'Instrument Serif',serif;font-size:22px;color:var(--text);margin-bottom:6px}
.panel-pill{display:inline-flex;align-items:center;gap:5px;font-size:10px;padding:3px 10px;border-radius:20px;font-weight:500}
.close-btn{position:absolute;top:14px;right:14px;background:var(--surface);border:1px solid var(--border2);color:var(--muted);cursor:pointer;width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s}
.close-btn:hover{background:var(--surface2);color:var(--text)}
.panel-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface);overflow-x:auto}
.panel-tabs::-webkit-scrollbar{display:none}
.panel-tab{flex-shrink:0;padding:10px 12px;font-size:10px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;text-transform:uppercase;letter-spacing:.07em;white-space:nowrap;font-weight:500}
.panel-tab:hover{color:var(--text)}
.panel-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.panel-body{flex:1;overflow-y:auto;padding:16px 18px 88px}
.panel-body::-webkit-scrollbar{width:4px}
.panel-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* CONTENT STYLES */
.resumen-text{font-size:13px;color:var(--muted);line-height:1.75;margin-bottom:14px}
.tag-cloud{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.tag{font-size:10px;padding:3px 9px;border-radius:20px;background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.tag.new{background:#faf6ee;color:var(--accent);border-color:#e8d9b8}
.sec-title{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.09em;color:var(--muted2);margin:14px 0 9px}
.sec-title:first-child{margin-top:0}
.resumen-bullets{padding-left:14px;margin-top:4px}
.resumen-bullets li{font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:2px}
.hot-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px}
.hot-card.critico{border-left:3px solid var(--danger)}
.hot-card.importante{border-left:3px solid var(--warn)}
.hot-card.estrategico{border-left:3px solid var(--purple)}
.hot-card.nuevo{border-left:3px solid var(--ok)}
.ht-label{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.ht-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px;line-height:1.35}
.ht-desc{font-size:11px;color:var(--muted);line-height:1.6}
.task-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer;align-items:flex-start;transition:opacity .15s}
.task-item:last-child{border-bottom:none}
.task-item.done{opacity:.45}
.task-item.done .task-text{text-decoration:line-through}
.task-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .15s;color:white}
.task-item.done .task-check{background:var(--ok);border-color:var(--ok)}
.task-prio{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.task-text{font-size:12px;line-height:1.45;color:var(--text)}
.task-meta{font-size:10px;color:var(--muted2);margin-top:2px}
.new-chip{display:inline-block;font-size:8px;padding:1px 5px;border-radius:4px;background:#faf6ee;color:var(--accent);border:1px solid #e8d9b8;margin-left:5px;vertical-align:middle;font-weight:500}
.comite-block{border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden}
.comite-block.latest{border-color:var(--accent)}
.comite-head{padding:10px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:var(--surface2);transition:background .1s}
.comite-head:hover{background:#eeece6}
.comite-fecha{font-size:10px;color:var(--accent);font-weight:500}
.comite-tit{font-size:12px;color:var(--text);margin-top:2px}
.comite-arr{color:var(--muted2);font-size:11px;transition:transform .2s}
.comite-arr.open{transform:rotate(90deg)}
.comite-content{display:none;padding:12px 14px;border-top:1px solid var(--border)}
.comite-content.open{display:block}
.comite-content ul{padding-left:14px}
.comite-content li{font-size:11px;color:var(--muted);line-height:1.7;margin-bottom:1px}
.hot-li{font-size:11px;color:var(--danger);display:flex;gap:6px;margin-bottom:3px;line-height:1.4}
.comite-hot{margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}
.bloque-pill{display:inline-block;font-size:9px;padding:2px 8px;border-radius:5px;margin:7px 0 4px;font-weight:500}
.risk-card{border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:8px;background:var(--surface2)}
.risk-card.rc{border-left:3px solid var(--danger)}
.risk-card.ra{border-left:3px solid var(--warn)}
.risk-card.rm{border-left:3px solid var(--info)}
.risk-nivel{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.risk-title{font-size:12px;font-weight:500;color:var(--text);margin-bottom:4px}
.risk-desc{font-size:11px;color:var(--muted);line-height:1.55}
.coh-explain{background:#f0ede6;border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:11px;color:var(--muted);line-height:1.6}
.coh-explain strong{color:var(--text)}
.coh-card{border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:8px;background:var(--surface2)}
.coh-head{display:flex;gap:7px;align-items:flex-start;margin-bottom:5px;flex-wrap:wrap}
.coh-pill{font-size:9px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap;margin-top:1px}
.coh-tit{font-size:12px;font-weight:500;color:var(--text);flex:1;line-height:1.35}
.coh-desc{font-size:11px;color:var(--muted);line-height:1.55}
hr.div{border:none;border-top:1px solid var(--border);margin:10px 0}

/* CHAT */
.chat-footer{border-top:1px solid var(--border);padding:12px 18px;background:var(--surface);position:absolute;bottom:0;left:0;right:0}
.chat-label{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
.chat-resp{margin-bottom:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--text);line-height:1.65;max-height:160px;overflow-y:auto;display:none}
.chat-resp.on{display:block}
.chat-resp::-webkit-scrollbar{width:3px}
.chat-resp::-webkit-scrollbar-thumb{background:var(--border2)}
.chat-row{display:flex;gap:8px;align-items:flex-end}
.chat-input{flex:1;border:1px solid var(--border2);border-radius:8px;padding:8px 12px;font-size:12px;font-family:'Inter',sans-serif;background:var(--surface2);color:var(--text);resize:none;min-height:36px;max-height:72px;outline:none;transition:border-color .15s}
.chat-input:focus{border-color:var(--accent)}
.chat-btn{background:var(--accent);border:none;border-radius:8px;color:white;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px;transition:opacity .15s}
.chat-btn:hover{opacity:.85}
.chat-btn:disabled{opacity:.35;cursor:not-allowed}
.dots{display:flex;gap:4px;align-items:center;padding:4px 0}
.dot{width:5px;height:5px;border-radius:50%;background:var(--muted2);animation:dp 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes dp{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-title">Comités · Seguimiento Ejecutivo</div>
  <div class="topbar-meta">
    <div class="meta-item"><div class="meta-num">13</div><div class="meta-label">Comités</div></div>

    <div class="meta-item"><div class="meta-num" id="pending-count">66</div><div class="meta-label">Tareas</div></div>
    <div class="meta-item"><div class="meta-num" style="color:var(--danger)">6</div><div class="meta-label">Críticos</div></div>
    <div class="meta-item"><div class="meta-num" style="color:var(--accent)">13 may</div><div class="meta-label">Actualizado</div></div>
  </div>
</div>
<div class="layout">
  <div class="canvas-wrap" id="canvas-wrap">
    <div class="global-search" id="global-search">
      <div class="gs-row">
        <input class="gs-input" id="gs-input" type="text"
          placeholder="Pregunta sobre cualquier empresa o comité… ej: ¿De qué se habló sobre fundraising en Maze?"

      <div class="gs-answer" id="gs-answer">
        <button class="gs-close" onclick="gsClose()">✕</button>
        <div id="gs-content"></div>

    </div>
    <div class="nodes-layer" id="nodes-layer"></div>
    <div class="hint" id="hint">Pincha una empresa para explorar</div>
  </div>
  <div class="panel closed" id="panel">
    <div class="panel-header" id="panel-header">
      <button class="close-btn" onclick="closePanel()">✕</button>
    </div>
    <div class="panel-tabs">
      <div class="panel-tab active" data-tab="resumen">Resumen</div>
      <div class="panel-tab" data-tab="hot">Hot Topics</div>
      <div class="panel-tab" data-tab="tareas">Tareas</div>
      <div class="panel-tab" data-tab="comites">Comités</div>
      <div class="panel-tab" data-tab="riesgos">Riesgos</div>
      <div class="panel-tab" data-tab="coherencia">Coherencia</div>
    </div>
    <div style="position:relative;flex:1;overflow:hidden;display:flex;flex-direction:column">
      <div class="panel-body" id="panel-body"></div>
      <div class="chat-footer">
        <div class="chat-label">Pregunta sobre esta empresa</div>
        <div class="chat-resp" id="chat-resp"></div>
        <div class="chat-row">
          <textarea class="chat-input" id="chat-input" placeholder="¿Qué debería hacer esta semana? ¿Cuál es el mayor riesgo?..." rows="1" onkeydown="handleKey(event)"></textarea>
          <button class="chat-btn" id="chat-btn" onclick="sendChat()">↑</button>
        </div>
      </div>
    </div>
  </div>
</div>

function buildLayout(){
  const wrap=document.getElementById('nodes-layer');
  wrap.innerHTML='';
  const W=wrap.offsetWidth,H=wrap.offsetHeight;
  const minD=Math.min(W,H);
  const cx=W*.5,cy=H*.5;
  const RC=minD*.24;

  // SVG for lines only
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width',W);svg.setAttribute('height',H);
  svg.style.cssText='position:absolute;top:0;left:0;pointer-events:none';
  wrap.appendChild(svg);

  // center node
  const cn=document.createElement('div');
  cn.className='node node-center';
  cn.style.cssText=`left:${cx}px;top:${cy}px`;
  cn.innerHTML=`<div class="node-circle"><div class="node-label">Grupo<br>Empresarial</div><div class="node-sub">May 2026</div></div>`;
  wrap.appendChild(cn);

  companies.forEach((key,i)=>{
    const d=DATA[key];
    const angle=(i/companies.length)*2*Math.PI-Math.PI/2;
    const px=cx+Math.cos(angle)*RC;
    const py=cy+Math.sin(angle)*RC;

    // spoke center → company
    const spoke=document.createElementNS('http://www.w3.org/2000/svg','line');
    spoke.setAttribute('x1',cx);spoke.setAttribute('y1',cy);
    spoke.setAttribute('x2',px);spoke.setAttribute('y2',py);
    spoke.setAttribute('stroke',d.color+'35');spoke.setAttribute('stroke-width','1.5');
    svg.appendChild(spoke);

    // company node
    const alta=d.tareas.filter(t=>t.pr==='alta').length;
    const div=document.createElement('div');
    div.className='node node-company';
    div.id='node-'+key;
    div.style.cssText=`left:${px}px;top:${py}px`;
    const shortName=key==='tradergy'?'Tradergy':key==='inmoyield'?'Inmoyield':key==='medren'?'MedREN':d.name.split(' ')[0];
    div.innerHTML=`<div class="node-circle" style="border-color:${d.color};border-width:2px">
      <div class="node-label" style="font-size:11px;color:${d.color}">${shortName}</div>
      <div class="node-sub">${d.lastComite}</div>
      <div class="node-badge" style="background:${d.color}">${alta}</div>
    </div>`;
    div.onclick=()=>openPanel(key);
    wrap.appendChild(div);


  });
}

function openPanel(key){
  activeCompany=key;
  document.getElementById('hint').style.display='none';
  companies.forEach(k=>{const n=document.getElementById('node-'+k);if(n)n.classList.toggle('active',k===key)});
  const d=DATA[key];
  document.getElementById('panel-header').innerHTML=`
    <button class="close-btn" onclick="closePanel()">✕</button>
    <div class="panel-eyebrow">${d.sub}</div>
    <div class="panel-title">${d.name}</div>
    <span class="panel-pill" style="background:${d.statusColor}18;color:${d.statusColor};border:1px solid ${d.statusColor}40">${d.numComites} comité${d.numComites>1?'s':''} · último ${d.lastComite}</span>`;
  document.getElementById('panel').classList.remove('closed');
  document.getElementById('chat-resp').textContent='';
  document.getElementById('chat-resp').classList.remove('on');
  document.getElementById('chat-input').value='';
  switchTab(currentTab);
}

function closePanel(){
  document.getElementById('panel').classList.add('closed');
  companies.forEach(k=>{const n=document.getElementById('node-'+k);if(n)n.classList.remove('active')});
  document.getElementById('hint').style.display='block';
  activeCompany=null;
}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.panel-tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  renderTab(tab);
}

  if(!activeCompany)return;
  const d=DATA[activeCompany];
  const body=document.getElementById('panel-body');

  if(tab==='resumen'){
    // Last comite bullets
    const last = d.comites[0];
    let bulletHtml = '';

        `<div style="margin-bottom:10px">
          <span class="bloque-pill" style="background:${b.lc};color:${b.ltc}">${b.l}</span>
          <ul class="resumen-bullets">${b.ps.slice(0,5).map(p=>`<li>${p}</li>`).join('')}</ul>

        </div>`).join('');

        ${last.hs&&last.hs.length?`<div style="margin-top:8px">${last.hs.map(h=>`<div class="hot-li" style="font-size:11px">▲ ${h}</div>`).join('')}</div>`:''}`;

function toggleTask(key,i){
  taskStates[key+'_'+i]=!taskStates[key+'_'+i];
  renderTab('tareas');
  let total=0;
  companies.forEach(k=>DATA[k].tareas.forEach((_,j)=>{if(!taskStates[k+'_'+j])total++}));
  document.getElementById('pending-count').textContent=total;
}

function tc(ci){
  document.getElementById('cb-'+ci).classList.toggle('open');
  document.getElementById('ca-'+ci).classList.toggle('open');
}

      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:350,
        system:ctx,
        messages:[{role:'user',content:q}]
      })
    });
    const data=await res.json();
    resp.textContent=data.content?.[0]?.text||'Sin respuesta.';
  }catch(e){
    resp.textContent='Error de conexión. Inténtalo de nuevo.';
  }
  btn.disabled=false;
}

// ── LOCAL SEARCH ENGINE ──────────────────────────────────────────
// Builds a flat index of all content: {empresa, fecha, tipo, texto}
function buildIndex(){
  const idx=[];
  companies.forEach(key=>{
    const d=DATA[key];
    // resumen
    idx.push({e:d.name,f:'Resumen',tipo:'resumen',t:d.resumen});
    // hot topics
    d.hotTopics.forEach(h=>idx.push({e:d.name,f:'Hot Topics',tipo:'hot',t:h.titulo+': '+h.desc}));
    // tareas
    d.tareas.forEach(t=>idx.push({e:d.name,f:'Tareas',tipo:'tarea',t:t.t}));
    // comites
    d.comites.forEach(c=>{
      const ps=c.bloques?c.bloques.flatMap(b=>b.ps):(c.ps||[]);
      const hs=c.bloques?c.bloques.flatMap(b=>b.hs||[]):(c.hs||[]);
      ps.forEach(p=>idx.push({e:d.name,f:c.f,tipo:'comite',t:p}));
      hs.forEach(h=>idx.push({e:d.name,f:c.f,tipo:'caliente',t:h}));
    });
    // coherencia
    d.coherencia.forEach(c=>idx.push({e:d.name,f:'Coherencia',tipo:'coherencia',t:c.t+': '+c.d}));
    // riesgos
    d.riesgos.forEach(r=>idx.push({e:d.name,f:'Riesgos',tipo:'riesgo',t:r.t+': '+r.d}));
  });
  return idx;
}

function tokenize(str){
  return str.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .split(/[\s,;:.()\-\/]+/)
    .filter(w=>w.length>2);
}

// Stop words to ignore when scoring
const STOP=['que','con','los','las','una','por','para','como','del','mas','pero','sin','sobre','hay','han','ser','est','esta','son','fue','sus','era','muy','cuando','donde','como','tambien','todo','solo','bien','mas','cada','entre','tras','desde','hasta','hacia','bajo','ante','segun','durante','mediante'];

function scoreEntry(entry, queryTokens){
  const entryTokens = tokenize(entry.t);
  let score = 0;
  queryTokens.forEach(qt=>{
    if(STOP.includes(qt)) return;
    entryTokens.forEach(et=>{
      if(et===qt) score+=3;
      else if(et.startsWith(qt) && qt.length>=4) score+=2;
      else if(et.includes(qt) && qt.length>=4) score+=1;
    });
  });
  // boost calientes and hot topics
  if(entry.tipo==='caliente') score*=1.4;
  if(entry.tipo==='hot') score*=1.3;
  if(entry.tipo==='riesgo') score*=1.2;
  return score;
}

function localSearch(query, filterKey){
  const qTokens = tokenize(query);
  if(!qTokens.length) return [];
  let idx = buildIndex();
  if(filterKey) idx = idx.filter(e=>DATA[filterKey]&&e.e===DATA[filterKey].name);
  const scored = idx
    .map(e=>({...e, score:scoreEntry(e,qTokens)}))
    .filter(e=>e.score>0)
    .sort((a,b)=>b.score-a.score);
  return scored.slice(0,12);
}

function formatResults(results, query){
  if(!results.length) return `<span style="color:var(--muted)">No encontré menciones relevantes de <em>"${query}"</em> en los comités registrados.</span>`;

  // Group by empresa
  const byEmp={};
  results.forEach(r=>{
    if(!byEmp[r.e]) byEmp[r.e]={};
    const key=r.f;
    if(!byEmp[r.e][key]) byEmp[r.e][key]=[];
    byEmp[r.e][key].push(r);
  });

  const qTokens=tokenize(query);
  function highlight(text){
    let t=text;
    qTokens.forEach(qt=>{
      if(STOP.includes(qt)||qt.length<3) return;
      const re=new RegExp('('+qt.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\w*)', 'gi');
      t=t.replace(re,'<mark style="background:#fef3c7;border-radius:2px;padding:0 2px">$1</mark>');
    });
    return t;
  }

  let html='';
  Object.entries(byEmp).forEach(([emp,fechas])=>{
    const color=Object.values(DATA).find(d=>d.name===emp)?.color||'var(--accent)';
    html+=`<div style="margin-bottom:14px">
      <div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:${color};margin-bottom:6px">${emp}</div>`;
    Object.entries(fechas).forEach(([fecha,items])=>{
      html+=`<div style="font-size:10px;color:var(--muted2);margin-bottom:3px">${fecha}</div>`;
      items.slice(0,3).forEach(item=>{
        const icon=item.tipo==='caliente'?'▲ ':item.tipo==='riesgo'?'⚠ ':item.tipo==='tarea'?'· ':'· ';
        const col=item.tipo==='caliente'?'var(--danger)':item.tipo==='riesgo'?'var(--warn)':'var(--text)';
        html+=`<div style="font-size:12px;color:${col};line-height:1.55;margin-bottom:4px;padding-left:8px">${icon}${highlight(item.t)}</div>`;
      });
    });
    html+='</div>';
  });
  return html;
}

// GLOBAL SEARCH
function gsClose(){
  document.getElementById('gs-answer').classList.remove('on');
  document.getElementById('gs-content').innerHTML='';
  document.getElementById('gs-input').value='';
}

function gsAsk(){
  const inp=document.getElementById('gs-input');
  const q=inp.value.trim();
  if(!q) return;
  const ans=document.getElementById('gs-answer');
  const cont=document.getElementById('gs-content');
  ans.classList.add('on');
  const results=localSearch(q,null);
  cont.innerHTML=formatResults(results,q);
}
